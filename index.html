<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Family Bill Splitter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; background: #f0f2f5; color: #1a1a1a; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { text-align: center; margin-top: 0; color: #2c3e50; }
        .input-group { margin-bottom: 16px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .family-entry { background: #f8f9fa; border: 1px solid #e9ecef; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .fam-row { display: flex; gap: 10px; margin-top: 8px; }
        .fam-row input { flex: 1; }
        .btn-add { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; background: white; color: #1a1a1a; margin-bottom: 10px; display: block; }
        .btn-calc-wrap { display: flex; justify-content: center; margin-top: 20px; margin-bottom: 4px; }
        .btn-calc {
            width: 130px; height: 130px; border-radius: 50%;
            background: #28a745; color: white; border: none;
            font-size: 15px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; text-align: center;
            line-height: 1.3;
            box-shadow: 0 4px 18px rgba(40,167,69,0.35);
        }
        .btn-new { width: 66%; margin: 16px auto 0; background: #f0f2f5; color: #555; border: 1px solid #ccc; font-size: 14px; padding: 10px; border-radius: 8px; cursor: pointer; display: block; font-weight: bold; }
        .result-box { margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .total-highlight { background: #e8f5e9; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; color: #2e7d32; }
        .remove-btn { float: right; background: none; border: none; color: #888; cursor: pointer; font-size: 16px; padding: 0 4px; }
        .notes-box { margin-top: 24px; border-top: 1px solid #eee; padding-top: 14px; }
        .notes-title { font-size: 13px; font-weight: bold; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        .notes-list { list-style: none; padding: 0; margin: 0; }
        .notes-list li { font-size: 13px; color: #666; padding: 5px 0; border-bottom: 1px solid #f0f0f0; display: flex; align-items: flex-start; gap: 8px; }
        .notes-list li:last-child { border-bottom: none; }
        .note-num { font-weight: bold; color: #1a1a1a; min-width: 16px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Family Bill Splitter</h2>

    <div class="input-group">
        <label>Total Bill Amount ($)</label>
        <input type="number" id="totalBill" placeholder="e.g. 250.00" step="0.01">
    </div>

    <div id="familyList">
        <div class="family-entry">
            <input type="text" placeholder="Family Name" class="fam-name" style="width:100%; box-sizing:border-box;">
            <div class="fam-row">
                <input type="number" placeholder="Adults" class="fam-adults" min="0">
                <input type="number" placeholder="Kids (optional)" class="fam-kids" min="0">
            </div>
        </div>
    </div>

    <button class="btn-add" onclick="addFamily()">+ Add Another Family</button>

    <div class="btn-calc-wrap">
        <button class="btn-calc" onclick="calculate()">Calculate<br>Now</button>
    </div>

    <div id="output" class="result-box" style="display:none;">
        <div id="summary" class="total-highlight"></div>
        <div id="breakdown"></div>
        <button class="btn-new" onclick="newCalculation()">New Calculation</button>
    </div>

    <div class="notes-box">
        <div class="notes-title">Notes</div>
        <ul class="notes-list">
            <li><span class="note-num">1.</span><span>Adults: ages 18 and above</span></li>
            <li><span class="note-num">2.</span><span>Kids: ages 3 – 17</span></li>
            <li><span class="note-num">3.</span><span>Anyone below age 3 is free</span></li>
        </ul>
    </div>
</div>

<script>
function addFamily() {
    const div = document.createElement('div');
    div.className = 'family-entry';
    div.innerHTML = `
        <button class="remove-btn" onclick="this.parentElement.remove()">✕</button>
        <input type="text" placeholder="Family Name" class="fam-name" style="width:100%; box-sizing:border-box;">
        <div class="fam-row">
            <input type="number" placeholder="Adults" class="fam-adults" min="0">
            <input type="number" placeholder="Kids (optional)" class="fam-kids" min="0">
        </div>
    `;
    document.getElementById('familyList').appendChild(div);
}

function calculate() {
    const bill = parseFloat(document.getElementById('totalBill').value);
    const names = document.getElementsByClassName('fam-name');
    const adultsArr = document.getElementsByClassName('fam-adults');
    const kidsArr = document.getElementsByClassName('fam-kids');

    if (!bill || bill <= 0) { alert('Please enter a valid bill amount.'); return; }

    let totalShares = 0;
    let families = [];

    for (let i = 0; i < names.length; i++) {
        let a = parseFloat(adultsArr[i].value) || 0;
        let k = parseFloat(kidsArr[i].value) || 0;
        let s = a + (k * 0.5);
        totalShares += s;
        families.push({ name: names[i].value || `Family ${i+1}`, shares: s, adults: a, kids: k });
    }

    if (totalShares <= 0) { alert('Please enter at least one adult.'); return; }

    const sharePrice = bill / totalShares;
    let html = '';

    families.forEach(f => {
        let amount = f.shares * sharePrice;
        let detail = [];
        if (f.adults > 0) detail.push(`${f.adults} adult${f.adults > 1 ? 's' : ''}`);
        if (f.kids > 0) detail.push(`${f.kids} kid${f.kids > 1 ? 's' : ''}`);
        html += `<div class="row">
            <span>${f.name}<br><span style="font-size:12px; color:#888">${detail.join(', ')}</span></span>
            <strong>$${amount.toFixed(2)}</strong>
        </div>`;
    });

    document.getElementById('summary').innerHTML =
        `Adult Share: $${sharePrice.toFixed(2)} &nbsp;|&nbsp; Kid Share: $${(sharePrice * 0.5).toFixed(2)}`;
    document.getElementById('breakdown').innerHTML = html;
    document.getElementById('output').style.display = 'block';
    window.scrollTo(0, document.body.scrollHeight);
}

function newCalculation() {
    document.getElementById('totalBill').value = '';
    const list = document.getElementById('familyList');
    list.innerHTML = `
        <div class="family-entry">
            <input type="text" placeholder="Family Name" class="fam-name" style="width:100%; box-sizing:border-box;">
            <div class="fam-row">
                <input type="number" placeholder="Adults" class="fam-adults" min="0">
                <input type="number" placeholder="Kids (optional)" class="fam-kids" min="0">
            </div>
        </div>`;
    document.getElementById('output').style.display = 'none';
}
</script>

</body>
</html>
